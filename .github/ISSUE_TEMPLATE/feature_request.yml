name: ✨ 功能建议
description: 提议新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题?
      description: 描述当前的不便 / 缺失的能力
      placeholder: 我在挑战模式下想加 +2 / DNF 惩罚标记, 但现在...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的解决方案
      placeholder: 在 TimesPanel 每条成绩旁加 [+2] [DNF] 按钮
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / 现有 workaround (可选)

  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 是否涉及 domain / render / UI / 全部?
