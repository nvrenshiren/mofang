name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # 允许手动触发 (Actions 页面有 Run workflow 按钮)
  workflow_dispatch:

# 同一 ref 的新 push 会取消前一次未完成的 run, 节省 CI 时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'  # 匹配 package.json engines
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (production)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 14

  # ↓↓↓ 可选: 自动部署到 GitHub Pages
  # 启用前需要在 仓库 Settings → Pages 选 "GitHub Actions" 作为来源
  deploy-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        # 在 GitHub Pages 上, 路径是 https://<user>.github.io/<repo>/
        # 所以 Vite 的 base 必须设成 /<repo>/, 否则资源 404
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
